<!DOCTYPE html>
<html>
<head>
    <title>CBB Top 25 Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1 { text-align: center; color: #b30000; margin-bottom: 10px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #222; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 8px; }
        input { border: 1px solid #ccc; padding: 5px; width: 90%; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; }
        .btn-save { background: #28a745; color: white; }
        .btn-add { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>College Basketball Top 25</h1>
    
    <div class="controls">
        <div>
            <label>Select Week: </label>
            <select id="weekSelect" onchange="loadWeek()"></select>
            <button class="btn-add" onclick="addWeek()">+ Add New Week</button>
        </div>
        <button class="btn-save" onclick="saveData()">💾 Save This Week</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 50px;">#</th>
                <th>Team Name</th>
                <th style="width: 120px;">Record</th>
                <th style="width: 80px;">+/-</th>
            </tr>
        </thead>
        <tbody id="rankings-body"></tbody>
    </table>
</div>

<script>
    let currentWeek = "Week 1";
    let allData = JSON.parse(localStorage.getItem('cbbData')) || { "Week 1": Array(25).fill({team: "", record: "", move: ""}) };

    function setup() {
        const select = document.getElementById('weekSelect');
        select.innerHTML = "";
        Object.keys(allData).forEach(week => {
            let opt = document.createElement('option');
            opt.value = week;
            opt.innerHTML = week;
            select.appendChild(opt);
        });
        renderTable();
    }

    function renderTable() {
        const body = document.getElementById('rankings-body');
        body.innerHTML = "";
        const data = allData[currentWeek] || Array(25).fill({team: "", record: "", move: ""});
        
        for (let i = 0; i < 25; i++) {
            const row = `<tr>
                <td><b>${i + 1}</b></td>
                <td><input type="text" class="t-name" value="${data[i]?.team || ''}"></td>
                <td><input type="text" class="t-rec" value="${data[i]?.record || ''}"></td>
                <td><input type="text" class="t-move" value="${data[i]?.move || ''}"></td>
            </tr>`;
            body.innerHTML += row;
        }
    }

    function saveData() {
        const teams = document.querySelectorAll('.t-name');
        const records = document.querySelectorAll('.t-rec');
        const moves = document.querySelectorAll('.t-move');
        
        let weekArray = [];
        for (let i = 0; i < 25; i++) {
            weekArray.push({ team: teams[i].value, record: records[i].value, move: moves[i].value });
        }
        
        allData[currentWeek] = weekArray;
        localStorage.setItem('cbbData', JSON.stringify(allData));
        alert("Saved " + currentWeek + " successfully!");
    }

    function addWeek() {
        let weekNum = Object.keys(allData).length + 1;
        let newWeekName = "Week " + weekNum;
        allData[newWeekName] = Array(25).fill({team: "", record: "", move: ""});
        currentWeek = newWeekName;
        setup();
        document.getElementById('weekSelect').value = newWeekName;
    }

    function loadWeek() {
        currentWeek = document.getElementById('weekSelect').value;
        renderTable();
    }

    setup();
</script>

</body>
</html>
